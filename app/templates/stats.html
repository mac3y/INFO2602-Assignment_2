{% extends "authenticated-base.html" %}

{% block title %}Stats{% endblock %}

{% block subpage_content %}
<div class="container mt-4">
    <h2>My Pokemon Stats</h2>
    <div id="container" style="width:100%; height:400px;"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/highcharts/10.3.3/highcharts.js"></script>
<script>
    function createChart() {
        const chartData = {{ chart_data | tojson }};
        console.log('Chart data:', chartData);
        
        if (chartData.length === 0) {
            chartData = [{"name": "No Pokemon", "y": 1}];
        }
        
        if (typeof Highcharts !== 'undefined') {
            Highcharts.chart('container', {
                chart: { type: 'pie' },
                title: { text: 'My Pokemon Collection' },
                series: [{ name: 'Pokemon', data: chartData }]
            });
            console.log('Chart created successfully');
            return true;
        } else {
            console.log('Highcharts still not loaded');
            return false;
        }
    }
    
    // Try to create chart immediately, then retry if needed
    if (!createChart()) {
        setTimeout(function() {
            createChart();
        }, 1000);
    }
</script>
{% endblock %}
